name: Flutter Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # 🔥 Decode keystore từ secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-key.jks

      # 🔥 Tạo key.properties
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=my-key.jks" >> android/key.properties

      # 🔥 Build APK có ký
      - run: flutter build apk --release

      # ⏰ timestamp
      - name: Set timestamp
        run: echo "TIME=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_ENV

      # 📦 rename
      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/pet-tag-${TIME}.apk

      # 📤 upload
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pet-tag-${{ env.TIME }}
          path: build/app/outputs/flutter-apk/pet-tag-${{ env.TIME }}.apk

      # 🚀 release
      - name: Release APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/pet-tag-${{ env.TIME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
